[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
  "-ra",
  "--strict-markers",
  "--tb=short",
]
markers = [
  "slow: tests that take more than a few seconds",
]

[tool.coverage.run]
source = ["scripts"]
branch = true

[tool.coverage.report]
skip_empty = true
show_missing = true
exclude_lines = [
  "pragma: no cover",
  "if __name__ == .__main__.:",
  "raise NotImplementedError",
]

[tool.ruff]
line-length = 110
target-version = "py310"
extend-exclude = ["tests/fixtures/demo-app"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "C4", "SIM", "RUF"]
ignore = [
  "E501",   # line too long — handled by formatter
  "RUF001", # ambiguous unicode chars — we use em-dashes intentionally
  "RUF002",
  "RUF003",
  "SIM105", # try/except/pass is clearer than contextlib.suppress for stdout reconfigure
  "SIM108", # ternary not always more readable
]

[tool.mypy]
python_version = "3.10"
warn_unused_ignores = true
warn_redundant_casts = true
ignore_missing_imports = true
files = ["scripts"]
